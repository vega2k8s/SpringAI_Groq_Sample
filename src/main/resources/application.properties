spring.application.name=groq

spring.profiles.active=groq
#spring.profiles.active=gpt

spring.ai.openai.api-key=${OPENAI_API_KEY}

# Groq
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=meta-llama/llama-4-scout-17b-16e-instruct


# gpt3.5
#spring.ai.openai.chat.options.model=gpt-3.5-turbo-0125
# gpt4
#spring.ai.openai.chat.options.model=gpt-4o-mini

spring.ai.openai.chat.options.temperature=0.7

# virtual thread
spring.threads.virtual.enabled=true

